  <body>
    <header class="container-fluid shadow-lg py-2 position-sticky top-0 z-3 bg-white">
        <div class="container">
            <div class="row align-items-center">
                <figure class="col-lg-6 text-center text-lg-start mb-0">
                    <img src="images/logo_black 1.svg" alt="logo">
                </figure>
                <div class="col-lg-6">
                    <div class="d-flex justify-content-end gap-1 gap-lg-3 py-3 py-lg-0 header-actions-wrapper">
                        <button class="btn btn-outline-success"><i class="fa-brands fa-whatsapp"></i> Chat With Us</button>
                        <button class="btn btn-primary call-btn"><i class="fa-solid fa-phone"></i> Call Us</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="container-fluid py-3 py-sm-4 py-lg-5">
        <div class="container">
            <div class="row justify-content-between gy-4 align-items-center">
                <div class="col-lg-6">
                    <div class="hero-content">
                        <h1>Career Opportunities in <span>Digital Marketing</span></h1>
                        <p>Digital marketing course so good,you only pay-after-placement</p>
                        <ul class="m-0 p-0">
                            <li class="mb-3"><i class="fa-solid fa-circle-check"></i> Specialization: Performance Marketing</li>
                            <li class="mb-3"><i class="fa-solid fa-circle-check"></i> Min salary of Rs 4.5 LPA</li>
                            <li class="mb-3"><i class="fa-solid fa-circle-check"></i> 50 seats only</li>
                        </ul>
                        <div class="hero-actions-wrapper d-flex gap-3 mt-5">
                            <button class="btn btn-primary demo-btn">Book 2 Days Demo</button>
                            <button class="btn btn-outline-light download-btn"><i class="fa-solid fa-download"></i> Download Curriculum</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <form class="hero-form">
                        <h3>Book Your Free Class Now!</h3>
                        <p>2 days of free demo classes without paying in advance!</p>
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Enter your name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Enter your Email">
                        </div>
                        <div class="mb-3">
                            <label for="number" class="form-label">Mobile Number</label>
                            <div class="input-group">
                                <span class="input-group-text" id="basic-addon1">+91</span>
                                <input type="number" class="form-control" id="number" placeholder="Enter your mobile number">
                            </div>
                        </div>
                        <button class="btn btn-success">Register Now</button>
                    </form>
                </div>
            </div>
